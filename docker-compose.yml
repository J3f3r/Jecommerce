version: '3.7'

services:
  pg-docker:
    image: postgres:14-alpine
    container_name: postgres-jecommerce
    environment:
      - POSTGRES_DB=jecommerce
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=1234567
    ports:
      - "5433:5432"
    volumes:
      - ./.data/postgresql/data:/var/lib/postgresql/data
    networks:
      - dev-network

  pgadmin-docker:
    image: dpage/pgadmin4
    container_name: pgadmin-jecommerce
    environment:
      - PGADMIN_DEFAULT_EMAIL=jeferson@gmail.com
      - PGADMIN_DEFAULT_PASSWORD=1234567
    ports:
      - "5050:80"
    volumes:
      - ./.data/pgadmin:/var/lib/pgadmin
    depends_on:
      - pg-docker
    networks:
      - dev-network

networks:
  dev-network:
    driver: bridge